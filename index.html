<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Aesthetic Diary 💖</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(to right, #ffd6e8, #e0f7ff);
}

h1 {
  text-align: center;
  padding: 20px;
}

.month {
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 15px;
}

/* 🖼️ Photo frame */
.frame {
  background: #fff;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.15);
  transform: rotate(-1deg);
  transition: 0.3s;
}

.frame:nth-child(even) {
  transform: rotate(1deg);
}

.frame:hover {
  transform: scale(1.05) rotate(0deg);
}

.frame img {
  width: 100%;
  height: 130px;
  object-fit: cover;
  border-radius: 10px;
}

/* 🎵 player spacing */
audio {
  margin-top: 10px;
  display: block;
}

/* 💌 button */
button {
  margin-top: 10px;
  padding: 8px 14px;
  border: none;
  border-radius: 10px;
  background: #ff8fcf;
  cursor: pointer;
}

/* 💌 popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  max-width: 400px;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<h1>My Memory Diary 💕</h1>

<div id="container"></div>

<!-- 💌 POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
  <div class="popup-box" id="popupText"></div>
</div>

<script>

// 📅 MONTH LIST
const months = [
  "December 2024",
  "January 2025","February 2025","March 2025","April 2025","May 2025","June 2025",
  "July 2025","August 2025","September 2025","October 2025","November 2025","December 2025",
  "January 2026","February 2026","March 2026","April 2026","May 2026","June 2026",
  "July 2026","August 2026","September 2026","October 2026","November 2026","December 2026"
];

const container = document.getElementById("container");

// 🔁 CREATE MONTHS
months.forEach(month => {

  const section = document.createElement("div");
  section.className = "month";

  const title = document.createElement("h2");
  title.textContent = month;

  // 🎵 YEAR-BASED MUSIC
  const year = month.split(" ")[1];

  const audio = document.createElement("audio");
  audio.controls = true;

  const source = document.createElement("source");
  source.src = `songs/${year}.mp3`;

  audio.appendChild(source);

  // 💌 BUTTON
  const btn = document.createElement("button");
  btn.textContent = "Read 💌";
  btn.onclick = () => openPopup(month);

  // 📸 GALLERY
  const gallery = document.createElement("div");
  gallery.className = "gallery";

  let totalPhotos = (month === "December 2024") ? 10 : 20;

  for (let i = 1; i <= totalPhotos; i++) {

    const frame = document.createElement("div");
    frame.className = "frame";

    const img = document.createElement("img");
    img.loading = "lazy";
    img.src = `images/${month}/${i}.jpg`;

    frame.appendChild(img);
    gallery.appendChild(frame);
  }

  section.appendChild(title);
  section.appendChild(audio);
  section.appendChild(btn);
  section.appendChild(gallery);

  container.appendChild(section);
});


// 💌 POPUP (YEAR TEXT)
function openPopup(month) {

  const year = month.split(" ")[1];
  let text = "";

  if(year === "2024"){
    text = "<b>2024 was magical ✨</b><br><br>Beautiful beginnings and cozy memories 💕";
  }

  else if(year === "2025"){
    text = "<b>2025 was a journey 🌟</b><br><br>Growth, learning, and unforgettable moments 💫";
  }

  else if(year === "2026"){
    text = "<b>2026 feels beautiful 💖</b><br><br>New dreams and happy memories ahead 🌸";
  }

  document.getElementById("popupText").innerHTML = `
    <h2>${month}</h2>
    <p>${text}</p>
  `;

  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
