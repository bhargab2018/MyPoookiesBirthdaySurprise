<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Photo + Music Diary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    h1 {
      text-align: center;
      padding: 20px;
    }
    .month {
      margin: 20px;
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      position: relative;
    }
    .month h2 {
      margin-bottom: 10px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .gallery img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }
    .music {
      margin: 10px 0;
    }
    .popup-btn {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: #ff9ecb;
      cursor: pointer;
    }
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      text-align: center;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<h1>My Cute Monthly Diary 💖</h1>

<div id="container"></div>

<!-- Popup -->
<div id="popup" class="popup" onclick="closePopup()">
  <div class="popup-content" id="popupContent"></div>
</div>

<script>
  const months = [
    "December 2024","January 2025", "February 2025", "March 2025", "April 2025", "May 2025", "June 2025",
    "July 2025", "August 2025", "September 2025", "October 2025", "November 2025", "December 2025"
  ];

  const container = document.getElementById("container");

  months.forEach(month => {
    const section = document.createElement("div");
    section.className = "month";

    const title = document.createElement("h2");
    title.textContent = month;

    // MUSIC PLAYER
    const musicDiv = document.createElement("div");
    musicDiv.className = "music";
    musicDiv.innerHTML = `
      <b>🎵 Add your song here:</b><br>
      <audio controls>
        <source src="songs/${month}.mp3" type="audio/mpeg">
      </audio>
    `;

    // POPUP BUTTON
    const btn = document.createElement("button");
    btn.className = "popup-btn";
    btn.textContent = "Read My Month 💌";
    btn.onclick = () => showPopup(month);

    // GALLERY
    const gallery = document.createElement("div");
    gallery.className = "gallery";

    for (let i = 1; i <= 20; i++) {
      const img = document.createElement("img");
      img.loading = "lazy";
      img.src = `https://picsum.photos/300/300?random=${month + i}`;
      gallery.appendChild(img);
    }

    section.appendChild(title);
    section.appendChild(musicDiv);
    section.appendChild(btn);
    section.appendChild(gallery);

    container.appendChild(section);
  });

  // POPUP CONTENT
  function showPopup(month) {
    const content = document.getElementById("popupContent");
    content.innerHTML = `
      <h2>${month}</h2>
      <p><b>This is where you write your creative paragraph 💖</b><br><br>
      Example: This month was full of memories, laughter, and growth... ✨</p>
    `;
    document.getElementById("popup").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }
</script>

</body>
</html>
